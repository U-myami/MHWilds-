<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>装備一覧 - MHWilds 調査記録室</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        /* ページ固有のスタイル（検索・グリッド） */
        .search-container {
            background: rgba(20, 18, 15, 0.95);
            border: 1px solid #4a3c2c;
            padding: 20px;
            margin: 30px 0;
        }

        .category-nav {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px;
        }

        .filter-btn {
            background: #1a1714; border: 1px solid #3d342a; color: #999;
            padding: 6px 14px; cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        .filter-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        .search-input {
            width: 100%; background: rgba(0,0,0,0.7); border: 1px solid #4a3c2c;
            color: white; padding: 12px; box-sizing: border-box; outline: none;
        }

        .equip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px; margin-bottom: 50px;
        }

        .equip-card {
            background: #0d0b09; border: 1px solid #4a3c2c;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .equip-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .equip-image-wrap {
            width: 100%; aspect-ratio: 1/1; background: #111;
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #222; overflow: hidden;
        }
        .equip-image-wrap img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .default-icon { font-size: 3rem; color: var(--gold); opacity: 0.6; }

        .equip-name {
            font-size: 0.85rem; color: var(--gold); line-height: 1.4;
            height: 2.8em; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="world-ui">

<main class="container">

            <button class="filter-btn" data-sub="ランス">ランス</button>
            <button class="filter-btn" data-sub="ガンランス">ガンランス</button>
            <button class="filter-btn" data-sub="スラッシュアックス">スラアク</button>
            <button class="filter-btn" data-sub="チャージアックス">チャアク</button>

<script>
    const WEAPON_ICONS = { "大剣": "⚔️", "太刀": "🔪", "頭": "🪖", "胴": "🧥", "腕": "🧤", "腰": "👖", "脚": "👢" };
    let currentSub = "すべて";
    let searchQuery = "";

    function renderEquip() {
        const container = document.getElementById('equip-container');
        if(!container) return;
        
        const filtered = EQUIP_DATA.filter(item => {
            const subMatch = (currentSub === 'すべて' || item.sub_category === currentSub);
            const query = searchQuery.toLowerCase();
            const nameMatch = item.name.toLowerCase().includes(query);
            const skillMatch = item.skills && item.skills.some(s => s.toLowerCase().includes(query));
            return subMatch && (nameMatch || skillMatch);
        });

        container.innerHTML = filtered.map(item => `
            <div class="equip-card" onclick="location.href='equipment-detail.html?id=${item.id}'">
                <div class="equip-image-wrap">
                    ${item.image ? `<img src="${item.image}" alt="${item.name}">` : `<div class="default-icon">${WEAPON_ICONS[item.sub_category] || "📜"}</div>`}
                </div>
                <div class="equip-name">${item.name}</div>
            </div>
        `).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSub = btn.dataset.sub;
            renderEquip();
        });
    });

    document.getElementById('ability-search').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderEquip();
    });

    window.onload = renderEquip;
</script>
