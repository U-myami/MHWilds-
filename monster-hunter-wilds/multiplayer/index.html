<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マルチ参加募集 - MHWilds</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <main class="container">
        <h2>マルチ参加募集</h2>
        <form id="recruit-form">
            <input type="text" id="username" placeholder="ハンター名" required><br>
            <textarea id="comment" placeholder="募集条件を入力"></textarea><br>
            <button type="submit">投稿する</button>
        </form>

        <div id="posts" style="margin-top: 20px;">
            <h3>最新の投稿</h3>
            <div id="post-list"></div>
        </div>
    </main>

    <script src="../js/comment.js"></script>
    <script>
        const form = document.getElementById("recruit-form");
        const list = document.getElementById("post-list");

        // localStorageから読み込み
        const loadPosts = () => {
            const posts = JSON.parse(localStorage.getItem("mh_posts") || "[]");
            list.innerHTML = posts.map(p => `
                <div class="card"><strong>${p.name}</strong>: ${p.comment}</div>
            `).join("");
        };

        form.onsubmit = (e) => {
            e.preventDefault();
            const posts = JSON.parse(localStorage.getItem("mh_posts") || "[]");
            posts.unshift({
                name: document.getElementById("username").value,
                comment: document.getElementById("comment").value
            });
            localStorage.setItem("mh_posts", JSON.stringify(posts.slice(0, 10))); // 10件保存
            loadPosts();
            form.reset();
        };
        loadPosts();
    </script>
</body>
</html>
