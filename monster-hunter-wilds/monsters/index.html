<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モンスター図鑑 - MHWilds 調査記録室</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .filter-section {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 30px;
            white-space: nowrap;
        }

        .filter-btn {
            background: var(--card-brown);
            border: 1px solid var(--accent-gold);
            color: var(--text-ivory);
            padding: 8px 20px;
            cursor: pointer;
            font-family: serif;
        }

        .filter-btn.active {
            background: var(--accent-gold);
            color: var(--bg-dark);
        }

        .monster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .monster-card {
            text-decoration: none;
            transition: transform 0.3s;
        }

        .monster-card:hover {
            transform: translateY(-5px);
        }

        .monster-img-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #110c08;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monster-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-img-text {
            color: #5d4037;
            font-size: 0.8rem;
            text-align: center;
        }

        .monster-info {
            background: var(--card-brown);
            padding: 15px;
            border: 1px solid var(--border-color);
            border-top: none;
        }

        .monster-name {
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent-gold);
        }

        .monster-meta {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        .suggest-item:hover {
            background: var(--accent-gold);
            color: var(--bg-dark) !important;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="../index.html" style="color:inherit; text-decoration:none;">MHWilds 調査記録室</a></h1>
            <nav>
                <ul>
                    <li><a href="../guide/index.html">ガイド</a></li>
                    <li><a href="index.html" style="color:var(--text-ivory); border-bottom: 2px solid var(--accent-gold);">モンスター</a></li>
                    <li><a href="../equipment/index.html">装備</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top:40px;">
        <h2 class="section-title">生息モンスター図鑑</h2>

        <div class="search-box-container" style="position: relative; margin-bottom: 20px;">
            <input type="text" id="monster-search" placeholder="モンスター名を入力..." autocomplete="off"
                style="width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--accent-gold); color: var(--text-ivory); font-family: serif;">
            <div id="suggest-list" style="position: absolute; width: 100%; z-index: 100; background: var(--card-brown); border: 1px solid var(--accent-gold); border-top: none; display: none;"></div> 
        </div>

        <div class="filter-section" id="map-filters">
            <button class="filter-btn active">全マップ</button>
            <button class="filter-btn">氷結地帯</button>
            <button class="filter-btn">隔絶地帯</button>
            <button class="filter-btn">緋の森</button>
        </div>

        <div class="filter-section" id="type-filters">
            <button class="filter-btn active">全種族</button>
            <button class="filter-btn">飛竜種</button>
            <button class="filter-btn">海竜種</button>
            <button class="filter-btn">牙獣種</button>
            <button class="filter-btn">鋏角種</button>
            <button class="filter-btn">獣竜種</button>
            <button class="filter-btn">古龍種</button>
        </div>

        <div class="monster-grid" id="monster-list"></div>
    </main>

    <script src="../data/monsters.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('monster-list');
            const mapButtons = document.querySelectorAll('#map-filters .filter-btn');
            const typeButtons = document.querySelectorAll('#type-filters .filter-btn');
            const searchInput = document.getElementById('monster-search');
            const suggestList = document.getElementById('suggest-list');

            let currentMap = '全マップ';
            let currentType = '全種族';
            let searchQuery = '';

            function hiraToKana(str) {
                return str.replace(/[ぁ-ん]/g, function(s) {
                    return String.fromCharCode(s.charCodeAt(0) + 0x60);
                });
            }

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value;
                const kanaQuery = hiraToKana(query);
                searchQuery = query;

                if (query.length === 0) {
                    suggestList.style.display = 'none';
                } else {
                    const matches = MONSTERS.filter(m => m.name.includes(kanaQuery));
                    if (matches.length > 0) {
                        suggestList.innerHTML = matches.map(m => `
                            <div class="suggest-item" style="padding: 10px; cursor: pointer; border-bottom: 1px solid #444; color: var(--text-ivory);">
                                ${m.name}
                            </div>
                        `).join('');
                        suggestList.style.display = 'block';
                    } else {
                        suggestList.style.display = 'none';
                    }
                }
                displayMonsters();
            });

            suggestList.addEventListener('click', (e) => {
                if (e.target.classList.contains('suggest-item')) {
                    searchInput.value = e.target.innerText.trim();
                    suggestList.style.display = 'none';
                    searchQuery = searchInput.value;
                    displayMonsters();
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-box-container')) {
                    suggestList.style.display = 'none';
                }
            });

            function displayMonsters() {
                const kanaSearch = hiraToKana(searchQuery);
                const filteredData = MONSTERS.filter(m => {
                    const mapMatch = (currentMap === '全マップ' || m.locations.includes(currentMap));
                    const typeMatch = (currentType === '全種族' || m.type === currentType);
                    const searchMatch = m.name.includes(kanaSearch);
                    return mapMatch && typeMatch && searchMatch;
                });

                if (typeof MONSTERS !== 'undefined' && filteredData.length > 0) {
                    listContainer.innerHTML = filteredData.map(m => `
                        <a href="monster-detail.html?id=${m.id}" class="monster-card">
                            <div class="monster-img-box">
                                <img src="../assets/images/monsters/${m.id}.webp" 
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                <div class="no-img-text" style="display:none;">
                                    [ ${m.name} ]<br>外見情報の記録を待機中...
                                </div>
                            </div>
                            <div class="monster-info">
                                <h3 class="monster-name">${m.name}</h3>
                                <div class="monster-meta">
                                    <span style="color:var(--accent-gold)">${m.type}</span><br>
                                    主な生息地: ${m.locations.join(', ')}
                                </div>
                            </div>
                        </a>
                    `).join('');
                } else {
                    listContainer.innerHTML = '<p style="padding:40px; text-align:center; color:var(--accent-gold);">条件に一致する調査記録はありません。</p>';
                }
            }

            mapButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    mapButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMap = btn.innerText;
                    displayMonsters();
                });
            });

            typeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    typeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentType = btn.innerText;
                    displayMonsters();
                });
            });

            displayMonsters();
        });
    </script>
</body>
</html>
