<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装備詳細 - MHWilds 調査記録室</title>
    <style>
        :root {
            --bg-deep: #0f0d0b;
            --bg-card: #231f1b;
            --brd-gold: #846d4c;
            --txt-main: #f0ede9;
            --txt-gold: #ffdb4d;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--txt-main);
            margin: 0;
            padding: 20px;
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
        }

        .container { max-width: 950px; margin: 0 auto; }

        .detail-main {
            background: var(--bg-card);
            border: 1px solid var(--brd-gold);
            padding: 40px;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            min-height: 500px; /* 🌟最小高さを少し低く調整 */
            display: flex;
            flex-direction: column;
        }

        .header-flex {
            display: flex; gap: 40px; margin-bottom: 30px;
            align-items: flex-start; /* 🌟画像が小さくても上揃えに */
        }

        /* 🌟 画像ボックス：横幅を固定、高さは画像に合わせる */
        .img-box {
            width: 300px; /* 🌟横幅を固定 */
            /* height: 300px; 🌟高さを削除 */
            background: #000;
            border: 1px solid var(--brd-gold);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            flex-shrink: 0;
            min-height: 150px; /* 🌟画像がない場合の最小高さ */
        }
        .img-box img { 
            width: 100%; /* 🌟横幅を枠いっぱいにする */
            height: auto; /* 🌟高さは自動（アスペクト比維持） */
            display: block;
            z-index: 2; 
            position: relative; 
        }
        .no-image-text { position: absolute; color: #444; font-size: 0.8rem; z-index: 1; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .info-area { flex: 1; }
        .meta-info { color: var(--txt-gold); font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        h2 { 
            color: #fff; font-size: 2.3rem; margin: 0 0 20px 0; 
            border-bottom: 2px solid var(--brd-gold); padding-bottom: 10px;
        }

        .status-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .status-table td { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
        .label { color: var(--txt-gold); width: 130px; font-size: 1rem; font-weight: bold; }
        .val { color: #fff; font-weight: bold; font-size: 1.1rem; }

        /* 耐性・属性の表示スタイル */
        .res-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .res-box { 
            background: #000; padding: 5px 12px; border: 1px solid #444; 
            font-size: 0.9rem; min-width: 60px; text-align: center;
        }

        .section-title {
            color: var(--txt-gold); border-left: 4px solid var(--txt-gold);
            padding-left: 15px; margin: 40px 0 20px 0; font-size: 1.2rem;
        }

        /* 必要素材エリア */
        .mat-list { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            list-style: none; padding: 0; margin: 0;
        }
        .mat-item { 
            background: rgba(255,255,255,0.05); padding: 15px; 
            display: flex; justify-content: space-between; border-left: 3px solid var(--brd-gold);
            font-size: 1rem;
        }
        .cost-text { text-align: right; margin-top: auto; padding-top: 30px; font-size: 1.3rem; color: #fff; font-weight: bold; }

        .btn-back {
            display: inline-block; margin-top: 20px; color: var(--txt-gold);
            text-decoration: none; border: 1px solid var(--brd-gold); padding: 12px 30px;
            transition: 0.2s;
            background: rgba(0,0,0,0.3);
        }
        .btn-back:hover { background: var(--brd-gold); color: #fff; }

        @media (max-width: 768px) {
            .header-flex { flex-direction: column; align-items: center; }
            .img-box { width: 100%; max-width: 300px; }
            .mat-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="root">
        </div>
    <a href="index.html" class="btn-back">← 装備一覧に戻る</a>
</div>

　　<script src="../data/armors/arm.js"></script>
　　<script src="../data/armors/body.js"></script>
　　<script src="../data/armors/head.js"></script>
　　<script src="../data/armors/leg.js"></script>
　　<script src="../data/armors/waist.js"></script>

　　<script src="../data/weapons/bow.js"></script>
　　<script src="../data/weapons/charge_blade.js"></script>
　　<script src="../data/weapons/dual_blades.js"></script>
　　<script src="../data/weapons/greatsword.js"></script>
　　<script src="../data/weapons/gun_lance.js"></script>
　　<script src="../data/weapons/hammer.js"></script>
　　<script src="../data/weapons/heavy_bowgun.js"></script>
　　<script src="../data/weapons/hunting_horn.js"></script>
　　<script src="../data/weapons/insect_glaive.js"></script>
　　<script src="../data/weapons/lance.js"></script>
　　<script src="../data/weapons/light_bowgun.js"></script>
　　<script src="../data/weapons/longsword.js"></script>
　　<script src="../data/weapons/switch_axe.js"></script>
　　<script src="../data/weapons/sword_and_sheild.js"></script>
    <script src="../data/equipment_master.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const item = (typeof EQUIP_DATA !== 'undefined') ? EQUIP_DATA.find(e => String(e.id) === id) : null;

        if (!item) {
            document.getElementById('root').innerHTML = `<div class="detail-main"><p style="text-align:center; padding:100px;">データが見つかりませんでした (ID: ${id})</p></div>`;
            return;
        }

        // 属性・耐性のHTML生成
        let statusHtml = "";
        if (item.category === "武器") {
            const elColor = { "火":"#ff8a8a", "水":"#8ab4ff", "雷":"#ffe68a", "氷":"#a8ffff", "龍":"#e0a8ff" };
            const activeColor = elColor[item.element?.substring(0,1)] || "#fff";
            
            statusHtml = `
                <tr><td class="label">攻撃力</td><td class="val">${item.attack}</td></tr>
                <tr><td class="label">属性</td><td class="val" style="color:${activeColor}">${item.element || "無属性"}</td></tr>
                <tr><td class="label">会心率</td><td class="val">${item.affinity}%</td></tr>
            `;
        } else {
            const r = item.resists || { fire:0, water:0, thunder:0, ice:0, dragon:0 };
            statusHtml = `
                <tr><td class="label">防御力</td><td class="val">${item.defense}</td></tr>
                <tr>
                    <td class="label">属性耐性</td>
                    <td class="res-container">
                        <div class="res-box" style="border-bottom:2px solid #ff4d4d">火 ${r.fire}</div>
                        <div class="res-box" style="border-bottom:2px solid #4d79ff">水 ${r.water}</div>
                        <div class="res-box" style="border-bottom:2px solid #ffdb4d">雷 ${r.thunder}</div>
                        <div class="res-box" style="border-bottom:2px solid #4dffff">氷 ${r.ice}</div>
                        <div class="res-box" style="border-bottom:2px solid #c14dff">龍 ${r.dragon}</div>
                    </td>
                </tr>
            `;
        }

        document.getElementById('root').innerHTML = `
            <div class="detail-main">
                <div class="header-flex">
                    <div class="img-box" id="img-container">
                        <span class="no-image-text">NO IMAGE</span>
                        <img src="${item.image}" alt="" onerror="this.style.display='none'">
                    </div>
                    <div class="info-area">
                        <div class="meta-info">RARE ${item.rarity} / ${item.sub_category}</div>
                        <h2>${item.name}</h2>
                        <table class="status-table">
                            ${statusHtml}
                            <tr><td class="label">スロット</td><td class="val">${(item.slots || [0,0,0]).map(s => s === 0 ? "[-]" : "[" + s + "]").join(" ")}</td></tr>
                            <tr><td class="label">発動スキル</td><td class="val">${item.skills ? item.skills.join("<br>") : "なし"}</td></tr>
                        </table>
                    </div>
                </div>

                <div class="section-title">必要素材</div>
                <div class="mat-list">
                    ${(item.materials || []).map(m => `
                        <div class="mat-item">
                            <span>${m.name}</span>
                            <span style="color:var(--txt-gold)">x${m.count}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="cost-text">生産費用: ${(item.cost || 0).toLocaleString()} z</div>
            </div>
        `;
    });
</script>
</body>
</html>
